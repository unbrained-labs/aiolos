# Base preset.
# aiolos does NOT ship skill content. Presets describe:
#   1. which Claude Code built-in agents to enable for this stack
#   2. where (from trusted sources) to fetch community skills
#   3. which installed CLIs to wrap (separately, via `aiolos tools`)
#
# Built-in agents ship with Claude Code. Listing them here is a pointer, not
# an install — `aiolos install` just writes a reference. The community
# skills in [fetch] are pulled from the authors you trust in trust.toml.

agents = [
  "code-reviewer",
]

# Populate with "owner/repo#skill-name" entries from trusted authors on your
# trust.toml allowlist. Leave empty and the preset is still useful — built-in
# agents activate on their own descriptions.
fetch = []
skills = []
